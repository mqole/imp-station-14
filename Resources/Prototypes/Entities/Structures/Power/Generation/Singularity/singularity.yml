- type: entity
  id: Singularity
  name: gravitational singularity
  description: A mesmerizing swirl of darkness that sucks in everything. If it's moving towards you, run.
  components:
  - type: Clickable
  - type: AmbientSound
    volume: -4
    range: 14
    sound:
      path: /Audio/Effects/singularity.ogg
  - type: Physics
    bodyType: Dynamic
    bodyStatus: InAir
  - type: CanMoveInAir
  - type: EventHorizon # To make the singularity consume things.
    radius: 0.5
    canBreachContainment: false
    colliderFixtureId: EventHorizonCollider
    consumerFixtureId: EventHorizonConsumer
  - type: GravityWell # To make the singularity attract things.
    baseRadialAcceleration: 10
    maxRange: 4
  - type: Fixtures
    fixtures:
      EventHorizonCollider:
        shape:
          !type:PhysShapeCircle
            radius: 0.35
        hard: true
        restitution: 0.8
        density: 99999
        mask:
        - SingularityLayer
        layer:
        - SingularityLayer
      EventHorizonConsumer:
        shape:
          !type:PhysShapeCircle
            radius: 0.35
        hard: false
        mask:
        - SingularityLayer
        layer:
        - SingularityLayer
  - type: Singularity
    energy: 180
    level: 1
    radsPerLevel: 2
    energyLoss: 1
  - type: RandomWalk # To make the singularity move around.
    maxSpeed: 2.5
    minSpeed: 1.875
  - type: SingularityDistortion
    falloffPower: 2.529822
    intensity: 3645
  - type: RadiationSource
    slope: 0.2 # its emit really far away
    intensity: 2
  - type: PointLight
    enabled: true
    radius: 10
  - type: Appearance
  - type: GuideHelp # Always strive to be helpful in trying times.
    guides:
    - SingularityEngine
    - SingularityTeslaEngine
    - Power
  - type: Tag
    tags:
    - GhostOnlyWarp
  - type: WarpPoint
    follow: true
    location: singularity
    blacklist:
      tags:
      - GhostOnlyWarp
  - type: Sprite
    sprite: _Impstation/deadlock.rsi # IMP FOOLS EDITS
    layers:
    - map: [ "VisualLevel" ]
      state: blackhole
      shader: unshaded
  - type: GenericVisualizer
    visuals:
      enum.SingularityAppearanceKeys.Singularity: # IMP FOOLS EDITS
       VisualLevel:
          1:
            sprite: _Impstation/deadlock.rsi
            state: blackhole
            scale: 1.0,1.0
          2:
            sprite: _Impstation/deadlock.rsi
            state: blackhole
            scale: 1.0,1.0
          3:
            sprite: _Impstation/deadlock.rsi
            state: blackhole
            scale: 1.0,1.0
          4:
            sprite: _Impstation/deadlock.rsi
            state: blackhole
            scale: 1.0,1.0
          5:
            sprite: _Impstation/deadlock.rsi
            state: blackhole
            scale: 1.5,1.5
          6:
            sprite: _Impstation/deadlock.rsi
            state: blackhole
            scale: .9,.9
  - type: SupermatterImmune # imp
