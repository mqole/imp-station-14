- type: entity
  parent: HeatExchanger
  id: HeatExchangerRetro
  name: retro radiator
  description: An older, bulkier radiator model. It may or may not actually be more efficient than the modern model.
  placement:
    mode: SnapgridCenter
  components:
  - type: HeatExchanger
    #the intent of this is to make fat radiators 25% more efficient per entity than thin ones as the cost of being more expensive and less dense
    #conductivity (G) affects how much gas passes through the radiator
    #seemingly does not affect efficiency, just how much gas can be processed per tick

    #convectionCoefficient (K) affects how effective the radiator is at transferring heat between the atmosphere and the gas in the pipe
    #effectiveness is asymptotic starting at ~250. Based on emperical testing, higher values don't do anything.
    #lower values *do* affect performance negatively, though.

    #radiationCoefficient (alpha) affects how effective the radiator is at transferring heat out
    #a value of 200 gets to about 1.25 effectiveness based on empirical testing
    radiationCoefficient: 200
  - type: Sprite
    sprite: Structures/Piping/Atmospherics/heatexchanger.rsi
  - type: AtmosPipeLayers
    spriteRsiPaths: {}
    alternativePrototypes: {}
    numberOfPipeLayers: 1
  - type: PipeAppearance
    sprite:
    - { sprite: _Impstation/Structures/Piping/Atmospherics/heatexchanger.rsi, state: pipeConnector }
  - type: Construction
    graph: GasBinary
    node: retroRadiator
  - type: StaticPrice
    price: 45

- type: entity
  parent: HeatExchangerRetro
  id: HeatExchangerRetroBend
  suffix: Bend
  components:
  - type: SubFloorHide
    visibleLayers:
    - enum.SubfloorLayers.FirstLayer
  - type: Sprite
    layers:
    - sprite: Structures/Piping/Atmospherics/pipe.rsi
      state: pipeBend
      map: [ "enum.PipeVisualLayers.Pipe" ]
    - state: heBend
      map: [ "enum.SubfloorLayers.FirstLayer" ]
  - type: NodeContainer
    nodes:
      inlet:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
      outlet:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: West
  - type: Construction
    graph: GasBinary
    node: retroBendRadiator
