- type: entity
  id: MachineAdvancedNodeScanner
  parent: [ BaseMachinePowered, SmallConstructibleMachine ]
  name: advanced node scanner
  description: Provides additional information and features when linked to an adjacent artifact analyzer.
  components:
  - type: Sprite
    noRot: true
    sprite: _Impstation/Structures/Machines/advanced_node_scanner.rsi
    layers:
    - map: ["computerLayerBody"]
      state: icon
    - map: ["computerLayerScreen"]
      state: unshaded
    - map: ["enum.AdvancedNodeScannerVisualLayers.Base"]
      state: linked
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.13,-0.28,0.1,0.58"
        density: 75
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Transform
    anchored: true
  - type: ApcPowerReceiver
    powerLoad: 500
    needsPower: true
  - type: AdvancedNodeScanner
    naturalNodeGraphVisibilityModifier: 1 #one further step
    pointMultiplier: 1.05 # 5% bonus points - remember to also change value in guidebook at Resources/ServerInfo/_Impstation/Guidebook/Science/AdvancedNodeScanner.xml
  - type: DeviceNetwork
    deviceNetId: Wired
    receiveFrequencyId: BasicDevice
  - type: DeviceList
  - type: DeviceLinkSource
    range: 2
    ports:
      - AdvancedNodeScannerSender
  - type: Machine
    board: AdvancedNodeScannerMachineCircuitboard
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#b53ca1"
  - type: GuideHelp
    guides:
    - AdvancedNodeScanner
  - type: LitOnPowered
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
      enum.AdvancedNodeScannerVisuals.Linked:
        enum.AdvancedNodeScannerVisualLayers.Base:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
