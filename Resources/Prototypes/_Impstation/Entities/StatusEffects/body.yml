#used for Hemorrhage trait
#needs to be its own status effect so it can stack with the hemorrhage debuff and isn't removed by admin rejuvenate
- type: entity
  parent: BloodstreamStatusEffectBase
  id: StatusEffectHemorrhageTrait
  components:
  - type: HemophiliaStatusEffect
    bleedReductionMultiplier: 1
    bleedAmountMultiplier: 1.33 #matches StatusEffectHemorrhage for consistency

# used to make sure recyclers dont instantly kill someone with damage
- type: entity
  parent: MobStatusEffectBase
  id: StatusEffectRecyclerImmune
