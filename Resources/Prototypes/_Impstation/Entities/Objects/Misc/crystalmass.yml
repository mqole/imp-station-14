- type: entity
  parent: CrystalMass
  id: CrystalBulb
  name: crystal bulb
  description: You see this bright and massive crystal mass looming towards you, cracking and screeching at every seemingly random movement.
  suffix: 6, Not Spreader
  components:
    - type: Sprite
      sprite: _Impstation/Objects/Misc/crystal_mass.rsi
      state: crystal_cascade_6
      layers:
      - state: crystal_cascade_6
        shader: unshaded
      drawdepth: FloorTiles
    - type: PointLight
      radius: 10
      energy: 2
      color: "#FBFF23"

- type: entity
  parent: CrystalMass
  id: CrystalMassSpreader
  suffix: DO NOT MAP, SPREADER
  components:
    - type: Sprite
      sprite: _Impstation/Objects/Misc/crystal_mass.rsi
      state: crystal_cascade_1
      drawdepth: FloorTiles
    - type: CrystalMass
      secondaryChance: 0.1667
      startupAppearance: true
    - type: ActiveTileClearCrystalMass
    - type: ActiveEdgeSpreader
    - type: EdgeSpreader
      id: CrystalMass
    - type: SinguloFood
      energy: 200

- type: entity
  parent: CrystalMassSpreader
  id: CrystalBulbSpreader
  name: crystal bulb
  description: You see this bright and massive crystal mass looming towards you, cracking and screeching at every seemingly random movement.
  components:
    - type: Sprite
      sprite: _Impstation/Objects/Misc/crystal_mass.rsi
      state: crystal_cascade_6
      layers:
      - state: crystal_cascade_6
        shader: unshaded
      drawdepth: FloorTiles
    - type: CrystalMass
      secondaryChance: 0.8333
      secondarySpawnPrototype: CrystalMassSpreader
      startupAppearance: false
      isLight: true
    - type: ActiveTileClearCrystalMass
