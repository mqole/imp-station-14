- type: entity
  id: CrystalMass
  abstract: true
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  name: crystal mass
  description: You see this massive crystal mass looming towards you, cracking and screeching at every seemingly random movement.
  components:
    - type: Appearance
    - type: Transform
      anchored: true
    - type: Physics
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          mask:
          - ItemMask
          layer:
          - WallLayer
          hard: false
    - type: Clickable
    - type: CrystalMassVisuals
    - type: CrystalMass
      startupAppearance: false
    - type: StepTrigger
      requiredTriggeredSpeed: 0
      intersectRatio: 0.1
      ignoreWeightless: true
      stepOn: true

- type: entity
  parent: CrystalMass
  id: CrystalMassOne
  suffix: 1, Not Spreader
  components:
    - type: Sprite
      sprite: _Impstation/Objects/Misc/crystal_mass.rsi
      state: crystal_cascade_1
      layers:
      - state: crystal_cascade_1
        shader: unshaded
      drawdepth: FloorTiles

