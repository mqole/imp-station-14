- type: entity
  parent: [ DrinkVisualsAllFilled, DrinkBaseMaterialGlass, DrinkBase, DrinkBaseOpenable ]
  id: ExtractBottleEmpty
  name: empty extract bottle
  description: A small bottle for holding extracts
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Consumable/Drinks/extractbottle.rsi
    layers:
    - state: icon_empty
      map: [ "enum.OpenableVisuals.Layer" ]
    - state: fill-6
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: SolutionContainerVisuals
    maxFillLevels: 6
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 15
  - type: Item
    size: Tiny
  - type: Openable
    sound:
      collection: bottleOpenSounds
    closeable: true
    closeSound:
      collection: bottleCloseSounds
  - type: Tool
    qualities:
    - Rolling
    speedModifier: 0.1 # Its so tiny, have fun waiting
  - type: TrashOnSolutionEmpty
    solution: drink
  - type: Tag
    tags:
    - DrinkBottle
  - type: Destructible
    thresholds:
    - trigger: # Overkill threshold
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior { }
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 1
        transferForensics: true
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: ExtractBottleEmpty
  id: ExtractBottleVanilla
  name: vanilla extract bottle
  description: A small bottle of vanilla extract.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Consumable/Drinks/extractbottle.rsi
    layers:
    - state: icon_empty
      map: [ "enum.OpenableVisuals.Layer" ]
    - state: fill-6
      map: [ "enum.SolutionContainerLayers.Fill" ]
    - state: vanilla_label
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 15
        reagents:
        - ReagentId: VanillaExtract
          Quantity: 15
