- type: entity
  id: BaseCartridgeLightRifle
  name: cartridge (.30 tactical)
  parent: [ BaseCartridge, BaseSecurityContraband ]
  abstract: true
  components:
  - type: Tag
    tags:
    - CartridgeLightRifle
  - type: CartridgeAmmo
    proto: BulletStandard
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals

- type: entity
  id: CartridgeLightRifle
  name: cartridge (.30 tactical)
  description: A kinetic full-power cartridge that boasts superior lethality and range but with a greater size than an intermediate cartridge. Typically used in precision rifles.
  parent: BaseCartridgeLightRifle
  components:
  - type: CartridgeAmmo
    proto: BulletStandard

- type: entity
  id: CartridgeLightRiflePractice
  name: cartridge (.30 tactical practice)
  description: A precision rifle cartridge with a wax projectile to simulate the real deal. Can be used for force-on-force training but still stings like a bitch. Eye protection recommended.
  parent: BaseCartridgeLightRifle
  components:
  - type: CartridgeAmmo
    proto: BulletStandardPractice
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#ffcb6f"

- type: entity
  id: CartridgeLightRifleIncendiary
  name: cartridge (.30 tactical incendiary)
  description: A precision rifle cartridge tipped with a softer projectile containing a pyrophoric compound, setting targets ablaze.
  parent: BaseCartridgeLightRifle
  components:
  - type: CartridgeAmmo
    proto: BulletStandardIncendiary
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#d46925"

- type: entity
  id: CartridgeLightRifleUranium
  name: cartridge (.30 tactical uranium)
  description: A precision rifle cartridge with a heavier depleted uranium projectile, delivering radiation poisoning at the cost of worse penetration.
  parent: BaseCartridgeLightRifle
  components:
  - type: CartridgeAmmo
    proto: BulletStandardUranium
  - type: Sprite
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
      - state: tip
        map: [ "enum.AmmoVisualLayers.Tip" ]
        color: "#22b24d"
